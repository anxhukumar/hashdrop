name: ci

on:
    pull_request:
        branches: [main]

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v4
            
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                go-version: "1.26.0"

            - name: Install sqlc
              run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

            - name: Generate database code
              working-directory: ./server
              run: sqlc generate
            
            - name: Run server tests
              working-directory: ./server
              run: go test ./... -cover
            
            - name: Install gosec
              run: go install github.com/securego/gosec/v2/cmd/gosec@latest
            
            - name: Gosec check on server
              working-directory: ./server
              run: gosec ./...
            
            - name: Gosec check on cli
              working-directory: ./cli
              run: gosec ./...
        
    style:
        name: Style
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v4
            
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                go-version: "1.26.0"

            - name: Install sqlc
              run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

            - name: Generate database code
              working-directory: ./server
              run: sqlc generate
            
            - name: Code format check on server
              working-directory: ./server
              run: test -z "$(gofmt -l .)"

            - name: Code format check on cli
              working-directory: ./cli
              run: test -z "$(gofmt -l .)"

            - name: Install staticcheck
              run: go install honnef.co/go/tools/cmd/staticcheck@latest

            - name: Lint check on server
              working-directory: ./server
              run: staticcheck ./...

            - name: Lint check on cli
              working-directory: ./cli
              run: staticcheck ./...
